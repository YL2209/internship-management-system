<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0084FF">
    <title>离线 · 实习数据管理系统</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/static/pwa/icon-32.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(0,132,255,0.10) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(255,192,0,0.10) 0%, transparent 60%),
                linear-gradient(160deg, #FFF8F0 0%, #FFE4E1 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                         "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            color: #2c3e50;
            padding: 1.5rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 18px;
            box-shadow: 0 10px 40px rgba(0, 132, 255, 0.12);
            padding: 2.4rem 1.8rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .icon {
            width: 96px;
            height: 96px;
            margin: 0 auto 1.2rem;
            display: block;
        }
        h1 {
            font-size: 1.35rem;
            font-weight: 600;
            color: #0084FF;
            margin-bottom: 0.6rem;
        }
        p {
            font-size: 0.92rem;
            color: #5a6c7d;
            line-height: 1.65;
            margin-bottom: 1.4rem;
        }
        .actions { display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.55rem 1.2rem;
            border-radius: 10px;
            font-size: 0.88rem;
            text-decoration: none;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(135deg, #0084FF, #006FE0);
            color: #fff;
            box-shadow: 0 4px 14px rgba(0, 132, 255, 0.25);
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0, 132, 255, 0.35); }
        .btn-ghost {
            background: transparent;
            color: #0084FF;
            border-color: rgba(0, 132, 255, 0.2);
        }
        .btn-ghost:hover { background: rgba(0, 132, 255, 0.06); }
        .tip {
            margin-top: 1.2rem;
            font-size: 0.78rem;
            color: #8aa0b4;
        }
    </style>
</head>
<body>
    <div class="card">
        <img class="icon" src="/static/pwa/icon-192.png" alt="logo">
        <h1>当前处于离线状态</h1>
        <p>无法连接到服务器。请检查网络后重试，或稍后再访问该页面。</p>
        <div class="actions">
            <a href="/" class="btn btn-primary">返回首页</a>
            <a href="javascript:location.reload()" class="btn btn-ghost">重新加载</a>
        </div>
        <p class="tip">已访问过的页面与静态资源可继续离线浏览。</p>
    </div>
</body>
</html>
